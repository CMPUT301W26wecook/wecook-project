name: Android Instrumentation Tests

on:
  pull_request:
    branches:
      - '**'
    branches-ignore:
      - Will-Halfway-Checkpoint
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-instrumentation:
    name: connectedDebugAndroidTest
    runs-on: macos-latest
    timeout-minutes: 45
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore google-services.json from secret
        shell: bash
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "Missing secret GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > app/google-services.json

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-reports
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/

  fork-pr-security-note:
    name: Fork PR note
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    steps:
      - name: Explain why instrumentation tests are skipped on fork PRs
        run: |
          echo "Instrumentation tests are skipped for fork pull requests to protect secrets."
          echo "Maintainers can run tests by checking out the branch in a trusted context."
